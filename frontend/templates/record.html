{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[80vh]">
    <h1 class="text-4xl font-bold text-gray-800 mb-8">Audio Recording</h1>

    <div class="relative">
        <button id="recordButton" onclick="toggleRecording()" class="w-48 h-48 rounded-full bg-red-500 hover:bg-red-600 text-white shadow-2xl transition-all duration-300 flex items-center justify-center focus:outline-none focus:ring-4 focus:ring-red-300 disabled:opacity-50 disabled:cursor-not-allowed">
            <div id="buttonIcon" class="text-6xl">
                🎙️
            </div>
        </button>
        <div id="recordingIndicator" class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 rounded-full animate-pulse hidden">
            <div class="w-full h-full bg-red-500 rounded-full animate-ping"></div>
        </div>
    </div>

    <p id="statusText" class="mt-8 text-xl text-gray-600">Click to start recording</p>

    <div id="recordingInfo" class="mt-4 text-sm text-gray-500 hidden">
        <p>Recording duration: <span id="duration">00:00</span></p>
    </div>

    <div id="lastRecordingInfo" class="mt-6 hidden">
        <div class="bg-white rounded-xl card-shadow p-4 max-w-md">
            <h3 class="font-semibold text-gray-800 mb-2">Last Recording</h3>
            <p class="text-sm text-gray-600" id="lastRecordingName"></p>
            <p class="text-sm text-gray-500" id="lastRecordingDuration"></p>
            <div class="mt-3 flex gap-2">
                <button onclick="playRecording()" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white px-3 py-2 rounded-lg text-sm transition">
                    Play
                </button>
                <button onclick="sendRecording()" id="sendButton" class="flex-1 ilionx-red-bg hover:bg-red-700 text-white px-3 py-2 rounded-lg text-sm transition">
                    Send to Backend
                </button>
            </div>
        </div>
    </div>

    <div id="errorInfo" class="mt-4 hidden">
        <div class="bg-red-50 border border-red-200 rounded-lg p-4 max-w-md">
            <p class="text-red-800 text-sm" id="errorMessage"></p>
        </div>
    </div>
</div>

<script>
let isRecording = false;
let recordingStartTime = null;
let durationInterval = null;
let statusInterval = null;

// Check status on page load
checkStatus();

function checkStatus() {
    fetch('/api/status')
        .then(response => response.json())
        .then(data => {
            updateUIFromStatus(data);
        })
        .catch(error => {
            console.error('Error checking status:', error);
        });
}

function updateUIFromStatus(data) {
    const button = document.getElementById('recordButton');
    const buttonIcon = document.getElementById('buttonIcon');
    const statusText = document.getElementById('statusText');
    const recordingIndicator = document.getElementById('recordingIndicator');
    const recordingInfo = document.getElementById('recordingInfo');
    const lastRecordingInfo = document.getElementById('lastRecordingInfo');
    const errorInfo = document.getElementById('errorInfo');
    const errorMessage = document.getElementById('errorMessage');

    // Handle device error
    if (data.device_error) {
        button.disabled = true;
        statusText.textContent = 'Device error: ' + data.device_error;
        errorInfo.classList.remove('hidden');
        errorMessage.textContent = data.device_error;
        return;
    }

    // Handle last error
    if (data.last_error) {
        errorInfo.classList.remove('hidden');
        errorMessage.textContent = data.last_error;
    } else {
        errorInfo.classList.add('hidden');
    }

    // Update recording state
    if (data.recording) {
        if (!isRecording) {
            isRecording = true;
            button.classList.remove('bg-red-500', 'hover:bg-red-600');
            button.classList.add('bg-red-700', 'hover:bg-red-800');
            buttonIcon.textContent = '⏹️';
            statusText.textContent = 'Recording...';
            recordingIndicator.classList.remove('hidden');
            recordingInfo.classList.remove('hidden');
            startDurationCounter();
        }
    } else {
        if (isRecording) {
            isRecording = false;
            button.classList.remove('bg-red-700', 'hover:bg-red-800');
            button.classList.add('bg-red-500', 'hover:bg-red-600');
            buttonIcon.textContent = '🎙️';
            statusText.textContent = 'Click to start recording';
            recordingIndicator.classList.add('hidden');
            recordingInfo.classList.add('hidden');
            stopDurationCounter();
        }
    }

    // Update last recording info
    if (data.has_recording && data.last_recording) {
        lastRecordingInfo.classList.remove('hidden');
        document.getElementById('lastRecordingName').textContent = data.last_recording;
        // Duration will be updated when recording stops
    } else {
        lastRecordingInfo.classList.add('hidden');
    }
}

function toggleRecording() {
    if (isRecording) {
        stopRecording();
    } else {
        startRecording();
    }
}

function startRecording() {
    fetch('/api/record/start', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.ok) {
            checkStatus();
        } else {
            showStatus('error', data.error || 'Failed to start recording');
        }
    })
    .catch(error => {
        console.error('Error starting recording:', error);
        showStatus('error', 'Network error: ' + error.message);
    });
}

function stopRecording() {
    fetch('/api/record/stop', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.ok) {
            checkStatus();
            // Update last recording info
            if (data.file) {
                document.getElementById('lastRecordingName').textContent = data.file;
                document.getElementById('lastRecordingDuration').textContent = data.duration + 's';
            }
        } else {
            showStatus('error', data.error || 'Failed to stop recording');
        }
    })
    .catch(error => {
        console.error('Error stopping recording:', error);
        showStatus('error', 'Network error: ' + error.message);
    });
}

function sendRecording() {
    const sendButton = document.getElementById('sendButton');
    sendButton.disabled = true;
    sendButton.textContent = 'Sending...';

    fetch('/api/record/send', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.ok) {
            showStatus('success', 'Recording sent to backend successfully!');
        } else {
            showStatus('error', data.error || 'Failed to send recording');
        }
    })
    .catch(error => {
        console.error('Error sending recording:', error);
        showStatus('error', 'Network error: ' + error.message);
    })
    .finally(() => {
        sendButton.disabled = false;
        sendButton.textContent = 'Send to Backend';
    });
}

function playRecording() {
    window.open('/api/recording/file', '_blank');
}

function startDurationCounter() {
    recordingStartTime = new Date();
    durationInterval = setInterval(updateDuration, 1000);
}

function stopDurationCounter() {
    clearInterval(durationInterval);
}

function updateDuration() {
    const now = new Date();
    const diff = Math.floor((now - recordingStartTime) / 1000);
    const minutes = Math.floor(diff / 60).toString().padStart(2, '0');
    const seconds = (diff % 60).toString().padStart(2, '0');
    document.getElementById('duration').textContent = `${minutes}:${seconds}`;
}

function showStatus(type, message) {
    const errorInfo = document.getElementById('errorInfo');
    const errorMessage = document.getElementById('errorMessage');

    if (type === 'success') {
        // For success, we could show a temporary message
        alert(message);
    } else {
        errorInfo.classList.remove('hidden');
        errorMessage.textContent = message;
    }
}

// Poll status every 2 seconds
statusInterval = setInterval(checkStatus, 2000);
</script>
{% endblock %}
